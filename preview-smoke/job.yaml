apiVersion: batch/v1
kind: Job
metadata:
  name: preview-smoke
  labels:
    app.kubernetes.io/name: preview-smoke
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: preview-smoke
    spec:
      restartPolicy: Never
      containers:
        - name: preview-smoke
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - /scripts/preview-smoke.sh
          envFrom:
            - configMapRef:
                name: preview-smoke-config
          volumeMounts:
            - name: preview-smoke-scripts
              mountPath: /scripts
      volumes:
        - name: preview-smoke-scripts
          configMap:
            name: preview-smoke-scripts
            defaultMode: 0555
