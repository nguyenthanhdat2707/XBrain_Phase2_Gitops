apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-book-hub-preview-plugin
  namespace: argocd
  labels:
    app.kubernetes.io/name: mini-book-hub-preview-plugin
    app.kubernetes.io/part-of: mini-book-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mini-book-hub-preview-plugin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mini-book-hub-preview-plugin
        app.kubernetes.io/part-of: mini-book-hub
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: plugin
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/server.mjs
          env:
            - name: PORT
              value: "4355"
            - name: TOKEN_FILE
              value: /var/run/argo/token
            - name: GITHUB_TOKEN_FILE
              value: /var/run/github/token
          ports:
            - name: http
              containerPort: 4355
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: plugin-code
              mountPath: /app
              readOnly: true
            - name: plugin-token
              mountPath: /var/run/argo
              readOnly: true
            - name: github-token
              mountPath: /var/run/github
              readOnly: true
      volumes:
        - name: plugin-code
          configMap:
            name: mini-book-hub-preview-plugin-code
        - name: plugin-token
          secret:
            secretName: mini-book-hub-preview-plugin-token
            items:
              - key: token
                path: token
        - name: github-token
          secret:
            secretName: mini-book-hub-preview-plugin-github-token
            optional: true
            items:
              - key: token
                path: token
