apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: mini-book-hub-preview
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - plugin:
        # Placeholder contract for the future ApplicationSet Plugin Generator.
        # The plugin must read:
        # - preview-metadata/pr-<number>.json
        # - image-locks/main.json
        # - PR label state, especially preview-ready
        #
        # It must return one item per PR preview runtime:
        # pr, previewProfile, namespace, applicationName, affectedComponents,
        # smokeProfiles, and resolved images. Affected components use candidate
        # images; unchanged runtime dependencies use stable image-lock images.
        configMapRef:
          name: mini-book-hub-preview-plugin
        input:
          parameters:
            gitopsRepository: nguyenthanhdat2707/XBrain_Phase2_Gitops
            gitopsRevision: main
            appRepository: nguyenthanhdat2707/XBrain_Phase2_App
            metadataPath: preview-metadata
            stableImageLock: image-locks/main.json
            readinessLabel: preview-ready
        requeueAfterSeconds: 60
  template:
    metadata:
      name: "{{ .applicationName }}"
      labels:
        app.kubernetes.io/part-of: mini-book-hub
        preview.mini-book-hub.io/pr: "{{ .pr }}"
        preview.mini-book-hub.io/profile: "{{ .previewProfile }}"
      annotations:
        preview.mini-book-hub.io/affected-components: "{{ .affectedComponents }}"
        preview.mini-book-hub.io/smoke-profiles: "{{ .smokeProfiles }}"
        preview.mini-book-hub.io/frontend-image: "{{ .images.frontend }}"
        preview.mini-book-hub.io/book-service-image: '{{ index .images "book-service" }}'
        preview.mini-book-hub.io/reader-service-image: '{{ index .images "reader-service" }}'
        preview.mini-book-hub.io/order-service-image: '{{ index .images "order-service" }}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/nguyenthanhdat2707/XBrain_Phase2_Gitops.git
          targetRevision: HEAD
          # Hybrid preview runtime bundle selected by impact profile.
          path: "apps/mini-book-hub/previews/{{ .previewProfile }}"
          kustomize:
            namespace: "{{ .namespace }}"
            images:
              - ghcr.io/nguyenthanhdat2707/mini-book-hub-frontend={{ .images.frontend }}
              - ghcr.io/nguyenthanhdat2707/mini-book-hub-book-service={{ index .images "book-service" }}
              - ghcr.io/nguyenthanhdat2707/mini-book-hub-reader-service={{ index .images "reader-service" }}
              - ghcr.io/nguyenthanhdat2707/mini-book-hub-order-service={{ index .images "order-service" }}
        - repoURL: https://github.com/nguyenthanhdat2707/XBrain_Phase2_Gitops.git
          targetRevision: HEAD
          # Shared smoke Job resources synced into the same preview namespace.
          path: preview-smoke
          kustomize:
            namespace: "{{ .namespace }}"
            patches:
              - target:
                  kind: ConfigMap
                  name: preview-smoke-config
                patch: |-
                  - op: replace
                    path: /data/PR_NUMBER
                    value: "{{ .pr }}"
                  - op: replace
                    path: /data/AFFECTED_COMPONENTS
                    value: "{{ .affectedComponents }}"
                  - op: replace
                    path: /data/SMOKE_PROFILES
                    value: "{{ .smokeProfiles }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
