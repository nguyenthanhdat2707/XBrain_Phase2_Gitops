apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-local
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/nguyenthanhdat2707/XBrain_Phase2_Gitops.git
    targetRevision: main
    path: apps/mini-book-hub/ingress/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: mini-book-hub-local
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
